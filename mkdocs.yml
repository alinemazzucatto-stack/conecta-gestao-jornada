site_name: Conecta Gestão de Jornada
site_description: Product Book e documentação técnica
site_author: Conecta

theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Modo escuro
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Modo claro
  font:
    text: Montserrat
    code: Roboto Mono

plugins:
  - search:
      lang: pt
  - mermaid2
  - git-revision-date-localized:
      locale: pt_BR
      enable_creation_date: true
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/extra.css

extra:
  generator: false

copyright: © 2026 Conecta Gestão de Jornada

nav:
  - Início: index.md
  - Product Book:
      - Visão Geral: product-book/index.md
      - Volume I — Arquitetura:
          - Introdução: product-book/volume-01-arquitetura/index.md
          - Visão do Produto: product-book/volume-01-arquitetura/01-visao-do-produto.md
          - Arquitetura Geral: product-book/volume-01-arquitetura/02-arquitetura-geral.md
          - Arquitetura Funcional: product-book/volume-01-arquitetura/03-arquitetura-funcional.md
      - Volume II — Especificação Funcional: product-book/volume-02-especificacao-funcional/index.md
      - Volume III — UX/UI: product-book/volume-03-ux-ui/index.md
      - Volume IV — Desenvolvimento: product-book/volume-04-desenvolvimento/index.md
      - Volume V — Implantação: product-book/volume-05-implantacao/index.md
  - Design System: design-system/index.md
  - Banco de Dados: banco-de-dados/index.md
  - APIs: api/index.md
  - ADRs:
      - Visão Geral: adr/index.md
      - ADR-001 — Nome do Produto: adr/adr-001-nome-do-produto.md
  - Roadmap: roadmap/index.md
  - Glossário: glossario/index.md
