      - ADR-002 — Multiempresa: adr/adr-002-multiempresa.md
      - ADR-003 — Fonte Única de Dados: adr/adr-003-fonte-unica-de-dados.md
      - ADR-004 — Auditoria Imutável: adr/adr-004-auditoria-imutavel.md
      - ADR-005 — API First: adr/adr-005-api-first.md
      - ADR-006 — Eventos de Domínio: adr/adr-006-eventos-de-dominio.md
      - ADR-007 — RBAC com Escopo: adr/adr-007-rbac-com-escopo.md
      - ADR-008 — Fechamento Imutável: adr/adr-008-fechamento-imutavel.md
  - Roadmap: roadmap/index.md
